function parseSections(text) {

    var nl = p.indexOf('\n');
    return { title: p.slice(0, nl).trim(), content: p.slice(nl + 1).trim() };
  }).filter(function(s){ return s.title && s.content; });
}

function mdToHtml(text) {
  var lines = text.split('\n');
  var html = '', inList = false;
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.startsWith('- ') || line.startsWith('* ')) {
      if (!inList) { html += '<ul class="res-list">'; inList = true; }
      html += '<li>' + line.slice(2).replace(/\*\*(.*?)\*\*/g, '<strong class="res-b">$1</strong>') + '</li>';
    } else {
      if (inList) { html += '</ul>'; inList = false; }
      if (line.trim()) {
        html += '<p class="res-p">' + line.replace(/\*\*(.*?)\*\*/g, '<strong class="res-b">$1</strong>') + '</p>';
      }
    }
  }
  if (inList) html += '</ul>';
  return html;
}
